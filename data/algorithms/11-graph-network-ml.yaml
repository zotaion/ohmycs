    fields: ["Recommendations", "link prediction"]
  - rank: 4
    algorithm: "Graph Neural Networks"
    best_for: "Learning from graph structure"
    fields: ["Molecules", "fraud", "knowledge graphs"]
  - rank: 5
    algorithm: "GraphSAGE / GCN / GAT"
    best_for: "Scalable graph representation learning"
    fields: ["Social networks", "recommender systems", "cybersecurity"]
  - rank: 6
    algorithm: "Link Prediction Models"
    best_for: "Predicting relationships"
