title: "Graph & Network ML"
summary: "Learn from data defined over nodes and edges: rankings, communities, and link structure."
defaults:
  - "Use PageRank for node importance and Louvain/Leiden for community detection."
  - "Use Graph Neural Networks (GraphSAGE/GCN/GAT) when you must learn from graph structure."
rows:
  - rank: 1
    algorithm: "PageRank"
    best_for: "Node importance"
    fields: ["Search", "citation networks", "fraud signals"]
