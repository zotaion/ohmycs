title: "Time-Series Forecasting"
summary: "Predict future values of ordered sequences from trends, seasonality, and lagged signals."
defaults:
  - "For business forecasting, start with ETS/SARIMA."
  - "Then try gradient boosting with lag features, then deep learning if you have lots of data."
rows:
  - rank: 1
    algorithm: "ARIMA / SARIMA"
    best_for: "Classical univariate forecasting"
    fields: ["Economics", "demand", "energy", "finance"]
  - rank: 2
    algorithm: "Exponential Smoothing / ETS / Holt-Winters"
    best_for: "Trend and seasonality"
    fields: ["Retail", "inventory", "operations"]
  - rank: 3
    algorithm: "Prophet-style additive models"
    best_for: "Business forecasting with seasonality/holidays"
    fields: ["Sales", "marketing", "web traffic"]
  - rank: 4
    algorithm: "Gradient Boosting for Time Series"
    best_for: "Feature-based forecasting"
    fields: ["Demand forecasting", "pricing", "operations"]
  - rank: 5
    algorithm: "LSTM / GRU"
    best_for: "Sequence-heavy forecasting"
    fields: ["Sensors", "energy", "finance"]
  - rank: 6
    algorithm: "Temporal CNN / TCN"
    best_for: "Long sequence forecasting"
    fields: ["Industrial IoT", "signals"]
  - rank: 7
    algorithm: "Transformer Forecasting Models"
    best_for: "Large-scale multivariate forecasting"
    fields: ["Retail", "logistics", "cloud metrics"]
  - rank: 8
    algorithm: "State Space Models / Kalman Filter"
    best_for: "Dynamic systems"
    fields: ["Robotics", "navigation", "economics"]
