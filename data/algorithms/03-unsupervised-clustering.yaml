title: "Unsupervised Learning: Clustering"
summary: "Group unlabeled data by structure and similarity to discover segments and patterns."
notes:
  - text: "scikit-learn's clustering documentation includes common clustering algorithms such as k-Means and related methods, with k-Means framed around minimizing within-cluster variance."
defaults:
  - "Start with k-Means for fast general clustering."
  - "Use HDBSCAN when clusters have arbitrary shapes or you need noise detection."
