title: "Supervised Learning: Regression & Classification"
summary: "Supervised models learn a mapping from labeled inputs to outputs for prediction."
defaults:
  - "For tabular business data, start with LightGBM/CatBoost/XGBoost, Random Forest, and Logistic/Linear Regression."
  - "Gradient boosting is widely recognized as a leading practical method for structured prediction and has been prominent in ML competitions."
rows:
  - rank: 1
    algorithm: "Gradient Boosted Trees: XGBoost, LightGBM, CatBoost, GBM"
    best_for: "High-performing tabular prediction"
    fields: ["Finance", "insurance", "fraud detection", "pricing", "marketing", "medicine", "churn prediction"]
  - rank: 2
    algorithm: "Random Forest"
    best_for: "Strong baseline, robust tabular modeling"
    fields: ["Healthcare", "credit risk", "customer analytics", "ecology", "operations"]
  - rank: 3
    algorithm: "Logistic Regression"
    best_for: "Binary/multiclass classification, interpretable baseline"
    fields: ["Credit scoring", "medical risk", "marketing response", "A/B testing"]
  - rank: 4
    algorithm: "Linear Regression / Ridge / Lasso / Elastic Net"
    best_for: "Numeric prediction, interpretable models"
    fields: ["Economics", "real estate", "sales forecasting", "demand forecasting"]
  - rank: 5
    algorithm: "Decision Tree"
    best_for: "Simple interpretable rules"
    fields: ["Business rules", "education", "healthcare triage", "explainable ML"]
  - rank: 6
    algorithm: "Support Vector Machine / SVR"
    best_for: "Smaller datasets, high-dimensional data"
    fields: ["Bioinformatics", "text classification", "image features"]
  - rank: 7
    algorithm: "k-Nearest Neighbors"
    best_for: "Simple similarity-based prediction"
    fields: ["Recommenders", "anomaly detection", "small classification tasks"]
  - rank: 8
    algorithm: "Naive Bayes"
    best_for: "Fast text classification"
    fields: ["Spam detection", "sentiment analysis", "document classification"]
  - rank: 9
    algorithm: "Generalized Linear Models"
    best_for: "Structured statistical modeling"
    fields: ["Biostatistics", "actuarial science", "econometrics"]
  - rank: 10
    algorithm: "Neural Networks / MLPs"
    best_for: "Nonlinear supervised learning"
    fields: ["Tabular DL", "forecasting", "embeddings", "scientific ML"]
