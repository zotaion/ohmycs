{{/* pluto.html — embed an exported Pluto notebook (static HTML).
     Usage: {{< pluto src="/notebooks/foo.html" title="..." >}} */}}
{{ $src := .Get "src" | default (.Get 0) }}
{{ $title := .Get "title" | default "Pluto notebook" }}
<iframe class="pluto-embed" src="{{ $src }}" title="{{ $title }}" loading="lazy"></iframe>
