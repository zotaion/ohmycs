baseURL = "/"
title = "Oh My Computer Science"
locale = "en-us"
defaultContentLanguage = "en"

pluralizeListTitles = false
disableKinds = ["taxonomy", "term", "rss"]

[outputs]
home = ["HTML"]
section = ["HTML"]
page = ["HTML"]

[params]
description = "A practical field guide to machine-learning algorithms."
author = "Oh My Computer Science"
repo = "https://github.com/zotaion/ohmycs" 
defaultTheme = "auto"

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.parser]
[markup.goldmark.parser.attribute]
title = true

[markup.highlight]
style = false
noClasses = true
lineNos = false
tabWidth = 2

[markup.tableOfContents]
startLevel = 2
endLevel = 3
ordered = false

# Math (KaTeX) — pass $...$ / $$...$$ / \(...\) / \[...\] through Goldmark untouched
# so KaTeX (loaded in baseof.html) can render them client-side.
[markup.goldmark.extensions.passthrough]
enable = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [['$$', '$$'], ['\\[', '\\]']]
inline = [['$', '$'], ['\\(', '\\)']]
