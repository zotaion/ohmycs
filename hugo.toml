baseURL = "/"
title = "Oh My Computer Science"
locale = "en-us"
defaultContentLanguage = "en"

pluralizeListTitles = false
disableKinds = ["taxonomy", "term", "rss"]

[outputs]
home = ["HTML"]
section = ["HTML"]
page = ["HTML"]

[params]
description = "A practical field guide to machine-learning algorithms."
author = "Oh My Computer Science"
repo = "https://example.org/repo"  # TODO: set real repository URL before publishing
defaultTheme = "auto"

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.parser]
[markup.goldmark.parser.attribute]
title = true

[markup.highlight]
style = false
noClasses = true
lineNos = false
tabWidth = 2

[markup.tableOfContents]
startLevel = 2
endLevel = 3
ordered = false
